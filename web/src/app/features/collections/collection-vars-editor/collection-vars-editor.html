<h2 mat-dialog-title>
  Variables
  <span class="coll-name">— {{ collectionName }}</span>
</h2>

<mat-dialog-content>
  <p class="scope-hint">
    Available to all requests in this collection.
    Overrides global variables; overridden by environment and request variables.
  </p>
  <app-vars-table [(rows)]="rows" />
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button (click)="save()">Save</button>
</mat-dialog-actions>
