<mat-form-field appearance="outline" class="env-field" subscriptSizing="dynamic">
  <mat-icon matPrefix class="env-icon">tune</mat-icon>
  <mat-select
    [value]="envService.activeId()"
    (selectionChange)="onChange($event.value)"
  >
    <mat-option [value]="null">No Environment</mat-option>
    @for (env of envService.environments(); track env.id) {
      <mat-option [value]="env.id">{{ env.name }}</mat-option>
    }
  </mat-select>
</mat-form-field>
