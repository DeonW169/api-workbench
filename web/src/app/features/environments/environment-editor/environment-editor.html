<h2 mat-dialog-title>{{ isNew ? 'New Environment' : 'Edit Environment' }}</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="name-field">
    <mat-label>Environment Name</mat-label>
    <input
      matInput
      [value]="name()"
      (input)="setName($event)"
      placeholder="e.g. Production"
    />
  </mat-form-field>

  <div class="vars-section">
    <div class="vars-label">Variables</div>

    <div class="vars-table">
      <div class="vars-thead">
        <span class="col-enabled" matTooltip="Enabled"></span>
        <span class="col-key">Key</span>
        <span class="col-value">Value</span>
        <span class="col-secret" matTooltip="Secret">
          <mat-icon class="secret-icon">visibility_off</mat-icon>
        </span>
        <span class="col-remove"></span>
      </div>

      @for (variable of variables(); track $index; let i = $index) {
        <div class="vars-row">
          <mat-checkbox
            class="col-enabled"
            [checked]="variable.enabled"
            (change)="setEnabled(i, $event.checked)"
          />
          <input
            class="var-input col-key"
            [value]="variable.key"
            (input)="setVarKey(i, $event)"
            placeholder="key"
            spellcheck="false"
            autocomplete="off"
          />
          <input
            class="var-input col-value"
            [value]="variable.value"
            (input)="setVarValue(i, $event)"
            [type]="variable.secret ? 'password' : 'text'"
            placeholder="value"
            spellcheck="false"
            autocomplete="off"
          />
          <mat-checkbox
            class="col-secret"
            [checked]="variable.secret ?? false"
            (change)="setSecret(i, $event.checked)"
            matTooltip="Treat as secret"
          />
          <button
            mat-icon-button
            class="col-remove remove-btn"
            (click)="removeVariable(i)"
            matTooltip="Remove"
          >
            <mat-icon>close</mat-icon>
          </button>
        </div>
      }

      <button mat-button class="add-var-btn" (click)="addVariable()">
        <mat-icon>add</mat-icon>
        Add Variable
      </button>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button [disabled]="!canSave()" (click)="save()">
    Save
  </button>
</mat-dialog-actions>
